version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketing_analytics
      POSTGRES_USER: marketing_analytics
      POSTGRES_PASSWORD: marketing_analytics2026!
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  jupyterlab:
    image: marketing-analytics-notebook:latest
    container_name: jupyterlab
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./data/notebooks:/home/jovyan/work
    command: >
      start-notebook.sh
      --NotebookApp.token='marketing_analytics2026!'